<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>LEgUle Sa – লাইভ ভিডিও স্ট্রিমিং</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Google Font (Hind Siliguri) -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <style>
        /* ===== রিসেট ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        /* ===== স্ক্রলবার ===== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #e74c3c; border-radius: 10px; }

        /* ===== হেডার ===== */
        header {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%);
            padding: 18px 25px;
            border-bottom: 3px solid #e74c3c;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(231, 76, 60, 0.15);
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #e74c3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo .highlight {
            color: #e74c3c;
            -webkit-text-fill-color: #e74c3c;
        }
        .live-badge {
            background: #e74c3c;
            color: #fff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse-badge 1.5s infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
        }
        @keyframes pulse-badge {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .admin-btn {
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid #e74c3c;
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .admin-btn:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }
        .admin-btn i {
            font-size: 16px;
        }

        /* ===== মেইন ===== */
        main {
            max-width: 1400px;
            margin: 25px auto;
            padding: 0 20px;
        }

        /* ===== ভিডিও প্লেয়ার (মডার্ন) ===== */
        .video-player-section {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid rgba(231, 76, 60, 0.15);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
        }
        .player-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }
        .player-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
        .player-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            width: fit-content;
            font-weight: 700;
            font-size: 15px;
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .pulse {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse-dot 1.2s infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.4; }
        }
        .stream-info {
            text-align: center;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            padding: 40px 25px 20px;
            margin: 0 -25px -25px;
        }
        .stream-info h2 {
            font-size: 32px;
            font-weight: 800;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.9);
            letter-spacing: 0.5px;
        }
        .stream-info p {
            color: #aaa;
            font-size: 17px;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ===== ভিডিও কন্ট্রোল ===== */
        .video-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: linear-gradient(145deg, #1a1a1a, #111111);
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .video-controls label {
            color: #aaa;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-controls select {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .video-controls select:hover {
            border-color: #e74c3c;
        }
        .video-controls button {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .video-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        /* ===== URL ইনপুট (মডার্ন) ===== */
        .url-input-section {
            margin-bottom: 30px;
        }
        .input-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-container input {
            flex: 1;
            min-width: 250px;
            padding: 14px 22px;
            border-radius: 50px;
            border: 2px solid #222;
            background: #111;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.4s ease;
            font-family: inherit;
        }
        .input-container input:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.1);
        }
        .input-container input::placeholder {
            color: #555;
        }
        .input-container button {
            padding: 14px 35px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            font-family: inherit;
        }
        .input-container button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(231, 76, 60, 0.4);
        }

        /* ===== বিজ্ঞাপন (মডার্ন) ===== */
        .ad-section {
            margin-bottom: 35px;
        }
        .ad-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .ad-item {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .ad-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(231, 76, 60, 0.3);
        }
        .ad-item img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .ad-item:hover img {
            transform: scale(1.03);
        }
        .ad-item .ad-content {
            padding: 15px 18px;
        }
        .ad-item .ad-content h4 {
            font-size: 15px;
            color: #ddd;
            font-weight: 600;
        }
        .ad-item .ad-content a {
            color: #e74c3c;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            transition: all 0.3s;
        }
        .ad-item .ad-content a:hover {
            color: #ff6b6b;
            gap: 10px;
        }

        /* ===== অন্যান্য স্ট্রিম (মডার্ন) ===== */
        .other-streams {
            margin-bottom: 35px;
        }
        .other-streams h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #fff;
        }
        .other-streams h2 i {
            color: #e74c3c;
        }
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }
        .stream-card {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .stream-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-color: #e74c3c;
        }
        .stream-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .stream-card:hover img {
            transform: scale(1.05);
        }
        .stream-card .stream-info-card {
            padding: 14px 18px 18px;
        }
        .stream-card .stream-info-card h4 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 3px;
        }
        .stream-card .stream-info-card p {
            color: #888;
            font-size: 14px;
        }
        .stream-card .stream-info-card .live-tag {
            color: #e74c3c;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }
        .stream-card .stream-info-card .live-tag::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse-dot 1.2s infinite;
        }

        /* ===== ফুটার ===== */
        footer {
            text-align: center;
            padding: 30px;
            color: #444;
            border-top: 1px solid #1a1a1a;
            font-size: 14px;
            font-weight: 400;
        }

        /* ===== রেস্পন্সিভ ===== */
        @media (max-width: 768px) {
            .logo h1 { font-size: 24px; }
            .stream-info h2 { font-size: 22px; }
            .video-controls { flex-direction: column; align-items: stretch; }
            .input-container { flex-direction: column; }
            .input-container button { width: 100%; justify-content: center; }
            .stream-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .header-container { flex-direction: column; align-items: flex-start; }
            .player-wrapper { aspect-ratio: 16/9; }
        }
        @media (max-width: 480px) {
            .logo h1 { font-size: 20px; }
            .stream-info h2 { font-size: 18px; }
            .stream-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .ad-container { grid-template-columns: 1fr; }
            .admin-btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <!-- ====== হেডার ====== -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1><span class="highlight">LEgUle</span> Sa</h1>
                <span class="live-badge"><i class="fas fa-circle" style="font-size:8px;margin-right:5px;"></i> লাইভ</span>
            </div>
            <div class="header-controls">
                <a href="admin.html" class="admin-btn"><i class="fas fa-user-shield"></i> অ্যাডমিন</a>
            </div>
        </div>
    </header>

    <!-- ====== মেইন ====== -->
    <main>

        <!-- ভিডিও প্লেয়ার -->
        <section class="video-player-section">
            <div class="player-wrapper">
                <video id="mainVideo" controls autoplay playsinline>
                    <source id="videoSource" src="" type="application/x-mpegURL" />
                    আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
                </video>
                <div class="player-overlay">
                    <div class="live-indicator">
                        <span class="pulse"></span>
                        <span>লাইভ স্ট্রিম</span>
                    </div>
                    <div class="stream-info">
                        <h2 id="streamTitle">স্ট্রিম নির্বাচন করুন</h2>
                        <p id="streamChannel">চ্যানেল</p>
                    </div>
                </div>
            </div>
            <div class="video-controls">
                <div class="quality-control">
                    <label><i class="fas fa-sliders-h"></i> রেজোলিউশন:</label>
                    <select id="qualitySelect">
                        <option value="auto">অটো</option>
                        <option value="1080">1080p</option>
                        <option value="720">720p</option>
                        <option value="480">480p</option>
                        <option value="360">360p</option>
                    </select>
                </div>
                <div class="stream-controls">
                    <button id="fullscreenBtn"><i class="fas fa-expand"></i> পূর্ণ পর্দা</button>
                </div>
            </div>
        </section>

        <!-- URL ইনপুট (শুধু এডমিনের লিংক বসানোর জন্য) -->
        <section class="url-input-section">
            <div class="input-container">
                <input type="text" id="videoUrlInput" placeholder="এডমিনের দেওয়া স্ট্রিম লিংক দিন..." />
                <button id="loadVideoBtn"><i class="fas fa-play"></i> স্ট্রিম দেখুন</button>
            </div>
        </section>

        <!-- বিজ্ঞাপন -->
        <section class="ad-section">
            <div class="ad-container" id="adContainer">
                <!-- এডমিন থেকে বিজ্ঞাপন আসবে -->
            </div>
        </section>

        <!-- অন্যান্য লাইভ স্ট্রিম -->
        <section class="other-streams">
            <h2><i class="fas fa-broadcast-tower"></i> অন্যান্য লাইভ স্ট্রিম</h2>
            <div class="stream-grid" id="streamGrid">
                <!-- এডমিন থেকে স্ট্রিম লিস্ট আসবে -->
            </div>
        </section>

    </main>

    <!-- ====== ফুটার ====== -->
    <footer>
        <p>&copy; 2026 LEgUle Sa - সর্বস্বত্ব সংরক্ষিত</p>
    </footer>

    <!-- ============================================================ -->
    <!-- =============== ফায়ারবেস + জাভাস্ক্রিপ্ট ================== -->
    <!-- ============================================================ -->

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        // ----- ইমপোর্ট -----
        import { initializeApp } from "firebase/app";
        import {
            getFirestore, collection, onSnapshot, query, orderBy
        } from "firebase/firestore";

        // ----- Firebase কনফিগারেশন (আপনার নিজেরটি বসান) -----
        const firebaseConfig = {
            apiKey: "AIzaSyBimdIKDEfbTa2PJyX5MY9Z585clkFZz98",
  authDomain: "legule-sa.firebaseapp.com",
  projectId: "legule-sa",
  storageBucket: "legule-sa.firebasestorage.app",
  messagingSenderId: "136313153279",
  appId: "1:136313153279:web:1aaa832933d0874cf04eca",
  measurementId: "G-Q7R70R2XZ1"
        };

        // ইনিৎ
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ----- DOM রেফারেন্স -----
        const video = document.getElementById('mainVideo');
        const videoSource = document.getElementById('videoSource');
        const streamTitle = document.getElementById('streamTitle');
        const streamChannel = document.getElementById('streamChannel');
        const videoUrlInput = document.getElementById('videoUrlInput');
        const loadVideoBtn = document.getElementById('loadVideoBtn');
        const qualitySelect = document.getElementById('qualitySelect');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const streamGrid = document.getElementById('streamGrid');
        const adContainer = document.getElementById('adContainer');

        let currentStreamUrl = '';

        // ===== ভিডিও লোড =====
        function loadVideo(url, name = '', channel = '') {
            if (!url) return;
            currentStreamUrl = url;
            videoSource.src = url;
            video.load();
            video.play().catch(e => console.log('অটোপ্লে ব্লক:', e));
            videoUrlInput.value = url;
            if (name) {
                streamTitle.textContent = name;
                streamChannel.textContent = channel || 'চ্যানেল';
            }
        }

        // ===== ইভেন্ট লিসেনার =====
        loadVideoBtn.addEventListener('click', () => {
            const url = videoUrlInput.value.trim();
            if (url) {
                loadVideo(url, 'কাস্টম স্ট্রিম', 'ইউজার ইনপুট');
            }
        });
        videoUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadVideoBtn.click();
        });

        qualitySelect.addEventListener('change', () => {
            console.log('কোয়ালিটি পরিবর্তন:', qualitySelect.value);
        });

        fullscreenBtn.addEventListener('click', () => {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        });

        // ===== ফায়ারস্টোর থেকে স্ট্রিম লোড =====
        function loadStreams() {
            const q = query(collection(db, 'streams'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                streamGrid.innerHTML = '';
                if (snapshot.empty) {
                    streamGrid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px;color:#555;font-size:16px;">
                            <i class="fas fa-video-slash" style="font-size:40px;display:block;margin-bottom:15px;color:#333;"></i>
                            কোনো লাইভ স্ট্রিম নেই
                        </div>
                    `;
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'stream-card';
                    card.innerHTML = `
                        <img src="${data.thumbnail || 'https://via.placeholder.com/400x225/1a1a1a/444?text=LEgUle+Sa'}" 
                             alt="${data.name}" 
                             onerror="this.src='https://via.placeholder.com/400x225/1a1a1a/444?text=LEgUle+Sa'">
                        <div class="stream-info-card">
                            <h4>${data.name || 'নামহীন স্ট্রিম'}</h4>
                            <p>${data.channel || 'চ্যানেল'}</p>
                            <span class="live-tag">লাইভ</span>
                        </div>
                    `;
                    card.addEventListener('click', () => {
                        if (data.url) {
                            loadVideo(data.url, data.name || 'লাইভ স্ট্রিম', data.channel || 'চ্যানেল');
                        }
                    });
                    streamGrid.appendChild(card);
                });
            }, (err) => console.error('স্ট্রিম লোডে সমস্যা:', err));
        }

        // ===== ফায়ারস্টোর থেকে বিজ্ঞাপন লোড =====
        function loadAds() {
            const q = query(collection(db, 'ads'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                adContainer.innerHTML = '';
                if (snapshot.empty) {
                    adContainer.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:30px;color:#333;font-size:14px;">
                            <i class="fas fa-ad" style="font-size:30px;display:block;margin-bottom:10px;"></i>
                            কোনো বিজ্ঞাপন নেই
                        </div>
                    `;
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'ad-item';
                    div.innerHTML = `
                        <img src="${data.imageUrl || 'https://via.placeholder.com/400x200/1a1a1a/444?text=বিজ্ঞাপন'}" 
                             alt="${data.name || 'বিজ্ঞাপন'}"
                             onerror="this.src='https://via.placeholder.com/400x200/1a1a1a/444?text=বিজ্ঞাপন'">
                        <div class="ad-content">
                            <h4>${data.name || 'বিজ্ঞাপন'}</h4>
                            ${data.link ? `<a href="${data.link}" target="_blank">বিস্তারিত দেখুন <i class="fas fa-arrow-right"></i></a>` : ''}
                        </div>
                    `;
                    adContainer.appendChild(div);
                });
            }, (err) => console.error('বিজ্ঞাপন লোডে সমস্যা:', err));
        }

        // ===== শুরু করুন =====
        loadStreams();
        loadAds();

        console.log('🔴 LEgUle Sa লাইভ স্ট্রিমিং প্ল্যাটফর্ম সক্রিয়!');
    </script>
