<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>LEgUle Sa – লাইভ ভিডিও স্ট্রিমিং</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #e74c3c;
            border-radius: 10px;
        }

        /* ===== হেডার ===== */
        header {
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e, #16213e);
            padding: 15px 20px;
            border-bottom: 3px solid #e74c3c;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(231, 76, 60, 0.15);
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .live-badge {
            background: #e74c3c;
            color: #fff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            animation: pulse-badge 1.5s infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
        }
        @keyframes pulse-badge {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.95);
            }
        }
        .admin-btn {
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid #e74c3c;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .admin-btn:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        /* ===== মেইন ===== */
        main {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* ===== ভিডিও প্লেয়ার ===== */
        .video-player-section {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid rgba(231, 76, 60, 0.15);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
        }
        .player-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }
        .player-wrapper video {
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
        }
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* ===== লাইভ ইন্ডিকেটর (৩ সেকেন্ড) ===== */
        .live-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }
        .live-indicator.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .live-indicator:hover {
            background: rgba(231, 76, 60, 0.2);
        }
        .live-indicator .pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse-dot 1.2s infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.4;
            }
        }

        /* ===== স্ট্রিম ইনফো ===== */
        .stream-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 25px 25px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            pointer-events: none;
        }
        .stream-overlay h2 {
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.9);
        }
        .stream-overlay p {
            color: #aaa;
            font-size: 16px;
            margin-top: 4px;
        }

        /* ===== ভিডিও কন্ট্রোল ===== */
        .video-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: linear-gradient(145deg, #1a1a1a, #111111);
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .video-controls .left-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .video-controls .right-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .video-controls label {
            color: #aaa;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .video-controls select {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .video-controls select:hover {
            border-color: #e74c3c;
        }
        .video-controls select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .video-controls button {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .video-controls button:hover {
            background: rgba(231, 76, 60, 0.3);
        }
        .video-controls input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        .video-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e74c3c;
            cursor: pointer;
        }

        /* ===== এম্বেড নোটিস ===== */
        .embed-notice {
            background: rgba(231, 76, 60, 0.08);
            border: 1px solid rgba(231, 76, 60, 0.15);
            border-radius: 10px;
            padding: 10px 16px;
            margin: 10px 20px;
            color: #888;
            font-size: 13px;
            display: none;
        }
        .embed-notice i {
            color: #e74c3c;
            margin-right: 8px;
        }

        /* ===== লাইক ও শেয়ার ===== */
        .video-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: linear-gradient(145deg, #1a1a1a, #111111);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }
        .video-actions .action-btn {
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .video-actions .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .video-actions .action-btn.liked {
            color: #e74c3c;
        }
        .video-actions .action-btn.liked i {
            color: #e74c3c;
        }
        .video-actions .action-btn i {
            font-size: 18px;
        }
        .video-actions .action-btn .count {
            font-size: 13px;
            color: #888;
        }

        /* ===== বিজ্ঞাপন ===== */
        .ad-section {
            margin-bottom: 30px;
        }
        .ad-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 18px;
        }
        .ad-item {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .ad-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(231, 76, 60, 0.3);
        }
        .ad-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .ad-item:hover img {
            transform: scale(1.03);
        }
        .ad-item .ad-content {
            padding: 12px 16px;
        }
        .ad-item .ad-content h4 {
            font-size: 14px;
            color: #ddd;
            font-weight: 600;
        }
        .ad-item .ad-content a {
            color: #e74c3c;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
            transition: all 0.3s;
        }
        .ad-item .ad-content a:hover {
            color: #ff6b6b;
            gap: 10px;
        }

        /* ===== স্ট্রিম গ্রিড ===== */
        .other-streams {
            margin-bottom: 30px;
        }
        .other-streams h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .other-streams h2 i {
            color: #e74c3c;
        }
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .stream-card {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .stream-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-color: #e74c3c;
        }
        .stream-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .stream-card:hover img {
            transform: scale(1.05);
        }
        .stream-card .stream-info-card {
            padding: 12px 16px;
        }
        .stream-card .stream-info-card h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stream-card .stream-info-card p {
            color: #888;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stream-card .stream-info-card .live-tag {
            color: #e74c3c;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
        }
        .stream-card .stream-info-card .live-tag::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse-dot 1.2s infinite;
        }

        /* ===== ফুটার ===== */
        footer {
            text-align: center;
            padding: 25px;
            color: #444;
            border-top: 1px solid #1a1a1a;
            font-size: 13px;
        }

        /* ===== রেস্পন্সিভ ===== */
        @media (max-width: 768px) {
            .logo h1 {
                font-size: 22px;
            }
            .stream-overlay h2 {
                font-size: 20px;
            }
            .video-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .video-controls .left-controls,
            .video-controls .right-controls {
                justify-content: center;
            }
            .stream-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .header-container {
                flex-direction: column;
                align-items: flex-start;
            }
            .player-wrapper {
                aspect-ratio: 16/9;
            }
        }
        @media (max-width: 480px) {
            .logo h1 {
                font-size: 18px;
            }
            .stream-overlay h2 {
                font-size: 17px;
            }
            .stream-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .ad-container {
                grid-template-columns: 1fr;
            }
            .video-actions {
                justify-content: center;
            }
            .video-actions .action-btn {
                font-size: 13px;
                padding: 5px 10px;
            }
            .admin-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ====== হেডার ====== -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1><span class="highlight">LEgUle</span> Sa</h1>
                <span class="live-badge"><i class="fas fa-circle" style="font-size:8px;margin-right:5px;"></i> লাইভ</span>
            </div>
            <div class="header-controls">
                <a href="admin.html" class="admin-btn"><i class="fas fa-user-shield"></i> অ্যাডমিন</a>
            </div>
        </div>
    </header>

    <!-- ====== মেইন ====== -->
    <main>

        <!-- ভিডিও প্লেয়ার -->
        <section class="video-player-section">
            <div class="player-wrapper" id="playerWrapper">
                <video id="mainVideo" controls autoplay playsinline>
                    <source id="videoSource" src="" type="application/x-mpegURL" />
                    <source id="videoSourceMp4" src="" type="video/mp4" />
                    আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
                </video>
                <iframe id="embedPlayer" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>

                <!-- লাইভ ইন্ডিকেটর (৩ সেকেন্ড) -->
                <div class="live-indicator" id="liveIndicator">
                    <span class="pulse"></span>
                    <span>লাইভ</span>
                </div>

                <!-- স্ট্রিম ইনফো -->
                <div class="stream-overlay">
                    <h2 id="streamTitle">স্ট্রিম নির্বাচন করুন</h2>
                    <p id="streamChannel">চ্যানেল</p>
                </div>
            </div>

            <!-- ভিডিও কন্ট্রোল -->
            <div class="video-controls">
                <div class="left-controls">
                    <label><i class="fas fa-sliders-h"></i> রেজোলিউশন:</label>
                    <select id="qualitySelect">
                        <option value="auto">অটো</option>
                        <option value="1080">1080p</option>
                        <option value="720">720p</option>
                        <option value="480">480p</option>
                        <option value="360">360p</option>
                    </select>
                    <button id="playPauseBtn"><i class="fas fa-play"></i></button>
                </div>
                <div class="right-controls">
                    <button id="volumeDownBtn"><i class="fas fa-volume-down"></i></button>
                    <input type="range" id="volumeSlider" min="0" max="100" value="80" />
                    <button id="volumeUpBtn"><i class="fas fa-volume-up"></i></button>
                    <button id="speedBtn"><i class="fas fa-tachometer-alt"></i> <span id="speedText">1x</span></button>
                    <button id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                </div>
            </div>

            <!-- লাইক ও শেয়ার -->
            <div class="video-actions">
                <button class="action-btn" id="likeBtn">
                    <i class="fas fa-heart"></i>
                    <span class="count" id="likeCount">0</span>
                </button>
                <button class="action-btn" id="shareBtn">
                    <i class="fas fa-share-alt"></i>
                    <span>শেয়ার</span>
                </button>
                <span id="currentVideoId" style="display:none;"></span>
            </div>

            <!-- এম্বেড নোটিস -->
            <div class="embed-notice" id="embedNotice">
                <i class="fas fa-info-circle"></i> YouTube/ভিডিও প্ল্যাটফর্মের কন্টেন্ট এম্বেড প্লেয়ারে দেখানো হচ্ছে।
            </div>
        </section>

        <!-- বিজ্ঞাপন -->
        <section class="ad-section">
            <div class="ad-container" id="adContainer"></div>
        </section>

        <!-- অন্যান্য লাইভ স্ট্রিম -->
        <section class="other-streams">
            <h2><i class="fas fa-broadcast-tower"></i> অন্যান্য লাইভ স্ট্রিম</h2>
            <div class="stream-grid" id="streamGrid"></div>
        </section>

    </main>

    <!-- ====== ফুটার ====== -->
    <footer>
        <p>&copy; 2026 LEgUle Sa - সর্বস্বত্ব সংরক্ষিত</p>
    </footer>

    <!-- ============================================================ -->
    <!-- =============== ফায়ারবেস + জাভাস্ক্রিপ্ট ================== -->
    <!-- ============================================================ -->

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        // ----- ইমপোর্ট -----
        import { initializeApp } from "firebase/app";
        import {
            getFirestore,
            collection,
            onSnapshot,
            query,
            orderBy,
            doc,
            updateDoc,
            increment,
            getDoc,
            setDoc
        } from "firebase/firestore";

        // ----- Firebase কনফিগারেশন -----
        const firebaseConfig = {
            apiKey: "AIzaSyBimdIKDEfbTa2PJyX5MY9Z585clkFZz98",
            authDomain: "legule-sa.firebaseapp.com",
            projectId: "legule-sa",
            storageBucket: "legule-sa.firebasestorage.app",
            messagingSenderId: "136313153279",
            appId: "1:136313153279:web:1aaa832933d0874cf04eca",
            measurementId: "G-Q7R70R2XZ1"
        };

        // ইনিৎ
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ----- DOM রেফারেন্স -----
        const video = document.getElementById('mainVideo');
        const videoSource = document.getElementById('videoSource');
        const videoSourceMp4 = document.getElementById('videoSourceMp4');
        const embedPlayer = document.getElementById('embedPlayer');
        const playerWrapper = document.getElementById('playerWrapper');
        const streamTitle = document.getElementById('streamTitle');
        const streamChannel = document.getElementById('streamChannel');
        const qualitySelect = document.getElementById('qualitySelect');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const volumeUpBtn = document.getElementById('volumeUpBtn');
        const volumeDownBtn = document.getElementById('volumeDownBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const speedBtn = document.getElementById('speedBtn');
        const speedText = document.getElementById('speedText');
        const streamGrid = document.getElementById('streamGrid');
        const adContainer = document.getElementById('adContainer');
        const embedNotice = document.getElementById('embedNotice');
        const likeBtn = document.getElementById('likeBtn');
        const likeCount = document.getElementById('likeCount');
        const shareBtn = document.getElementById('shareBtn');
        const currentVideoId = document.getElementById('currentVideoId');
        const liveIndicator = document.getElementById('liveIndicator');

        let currentStreamUrl = '';
        let currentStreamId = '';
        let currentStreamName = '';
        let currentStreamChannel = '';
        let isLiked = false;
        let isPlaying = false;
        let currentSpeed = 1;
        let liveIndicatorTimeout = null;

        // ===== লাইভ ইন্ডিকেটর ফাংশন =====
        function showLiveIndicator() {
            liveIndicator.classList.add('show');
            clearTimeout(liveIndicatorTimeout);
            liveIndicatorTimeout = setTimeout(() => {
                liveIndicator.classList.remove('show');
            }, 3000);
        }

        // লাইভ ইন্ডিকেটর ক্লিক করলে আবার দেখাবে
        liveIndicator.addEventListener('click', () => {
            liveIndicator.classList.add('show');
            clearTimeout(liveIndicatorTimeout);
            liveIndicatorTimeout = setTimeout(() => {
                liveIndicator.classList.remove('show');
            }, 3000);
        });

        // ===== ইউআরএল ডিটেক্ট =====
        function isYouTubeUrl(url) {
            return url.includes('youtube.com/watch') ||
                url.includes('youtu.be/') ||
                url.includes('youtube.com/embed/') ||
                url.includes('youtube.com/live/') ||
                url.includes('youtube.com/shorts/');
        }

        function isEmbeddableUrl(url) {
            return isYouTubeUrl(url) ||
                url.includes('facebook.com') ||
                url.includes('dailymotion.com') ||
                url.includes('vimeo.com') ||
                url.includes('twitch.tv');
        }

        function getEmbedUrl(url) {
            if (isYouTubeUrl(url)) {
                let videoId = '';
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1]?.split('?')[0] || '';
                } else if (url.includes('watch?v=')) {
                    videoId = url.split('v=')[1]?.split('&')[0] || '';
                } else if (url.includes('embed/')) {
                    videoId = url.split('embed/')[1]?.split('?')[0] || '';
                } else if (url.includes('youtube.com/live/')) {
                    videoId = url.split('youtube.com/live/')[1]?.split('?')[0] || '';
                } else if (url.includes('youtube.com/shorts/')) {
                    videoId = url.split('youtube.com/shorts/')[1]?.split('?')[0] || '';
                }
                if (videoId) {
                    return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                }
            }
            if (url.includes('vimeo.com')) {
                const videoId = url.split('vimeo.com/')[1]?.split('/')[0] || '';
                if (videoId) {
                    return `https://player.vimeo.com/video/${videoId}?autoplay=1`;
                }
            }
            if (url.includes('dailymotion.com')) {
                const videoId = url.split('dailymotion.com/video/')[1]?.split('_')[0] || '';
                if (videoId) {
                    return `https://www.dailymotion.com/embed/video/${videoId}?autoplay=1`;
                }
            }
            return url;
        }

        // ===== ভিডিও লোড =====
        function loadVideo(url, name = '', channel = '', videoId = '') {
            if (!url) return;
            currentStreamUrl = url;
            currentStreamName = name || 'লাইভ স্ট্রিম';
            currentStreamChannel = channel || 'চ্যানেল';
            currentStreamId = videoId || '';

            // সব লুকান
            video.style.display = 'none';
            embedPlayer.style.display = 'none';
            embedNotice.style.display = 'none';
            qualitySelect.disabled = false;

            // লাইভ ইন্ডিকেটর দেখান
            showLiveIndicator();

            // URL আপডেট (শেয়ারের জন্য)
            const newUrl = new URL(window.location);
            if (videoId) {
                newUrl.searchParams.set('v', videoId);
            } else {
                newUrl.searchParams.delete('v');
            }
            window.history.replaceState({}, '', newUrl);

            // ভিডিও লোড
            if (isEmbeddableUrl(url)) {
                const embedUrl = getEmbedUrl(url);
                embedPlayer.src = embedUrl;
                embedPlayer.style.display = 'block';
                embedNotice.style.display = 'block';
                streamTitle.textContent = name || 'এম্বেড ভিডিও';
                streamChannel.textContent = channel || 'প্ল্যাটফর্ম';
                qualitySelect.disabled = true;
                // এম্বেডের জন্য ভলিউম কন্ট্রোল ডিজেবল
                video.style.display = 'none';
            } else if (url.endsWith('.m3u8') || url.includes('.m3u8')) {
                videoSource.src = url;
                videoSourceMp4.src = '';
                video.load();
                video.play().catch(e => console.log('অটোপ্লে ব্লক:', e));
                video.style.display = 'block';
                streamTitle.textContent = name || 'লাইভ স্ট্রিম';
                streamChannel.textContent = channel || 'চ্যানেল';
                qualitySelect.disabled = false;
            } else if (url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.ogg')) {
                videoSourceMp4.src = url;
                videoSource.src = '';
                video.load();
                video.play().catch(e => console.log('অটোপ্লে ব্লক:', e));
                video.style.display = 'block';
                streamTitle.textContent = name || 'ভিডিও';
                streamChannel.textContent = channel || 'ফাইল';
                qualitySelect.disabled = false;
            } else {
                try {
                    new URL(url);
                    embedPlayer.src = url;
                    embedPlayer.style.display = 'block';
                    embedNotice.style.display = 'block';
                    streamTitle.textContent = name || 'এম্বেড কন্টেন্ট';
                    streamChannel.textContent = channel || 'প্ল্যাটফর্ম';
                    qualitySelect.disabled = true;
                    video.style.display = 'none';
                } catch {
                    alert('❌ এই URL সাপোর্টেড নয়! YouTube, M3U8 বা MP4 URL দিন।');
                }
            }

            // লাইক রিসেট
            isLiked = false;
            likeBtn.classList.remove('liked');
            if (videoId) {
                loadLikes(videoId);
            } else {
                likeCount.textContent = '0';
            }
            currentVideoId.textContent = videoId || url;
        }

        // ===== লাইক ফাংশন =====
        async function loadLikes(videoId) {
            if (!videoId) return;
            try {
                const docRef = doc(db, 'likes', videoId);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    likeCount.textContent = docSnap.data().count || 0;
                } else {
                    likeCount.textContent = '0';
                }
            } catch (error) {
                console.error('লাইক লোড করতে সমস্যা:', error);
            }
        }

        async function toggleLike() {
            const videoId = currentVideoId.textContent;
            if (!videoId) {
                alert('কোন ভিডিও নির্বাচন করা হয়নি!');
                return;
            }

            try {
                const docRef = doc(db, 'likes', videoId);
                const docSnap = await getDoc(docRef);

                if (isLiked) {
                    if (docSnap.exists()) {
                        await updateDoc(docRef, { count: increment(-1) });
                    }
                    isLiked = false;
                    likeBtn.classList.remove('liked');
                } else {
                    if (docSnap.exists()) {
                        await updateDoc(docRef, { count: increment(1) });
                    } else {
                        await setDoc(docRef, {
                            count: 1,
                            videoId: videoId,
                            timestamp: new Date().toISOString()
                        });
                    }
                    isLiked = true;
                    likeBtn.classList.add('liked');
                }
                await loadLikes(videoId);
            } catch (error) {
                console.error('লাইক আপডেট করতে সমস্যা:', error);
                alert('লাইক দিতে সমস্যা হয়েছে!');
            }
        }

        // ===== শেয়ার ফাংশন =====
        function shareVideo() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: currentStreamName || 'LEgUle Sa',
                    text: `${currentStreamName || 'লাইভ স্ট্রিম'} দেখুন!`,
                    url: url
                }).catch(err => console.log('শেয়ার বাতিল:', err));
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('✅ লিংক কপি করা হয়েছে!');
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = url;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('✅ লিংক কপি করা হয়েছে!');
                });
            }
        }

        // ===== ভলিউম কন্ট্রোল =====
        volumeSlider.addEventListener('input', function() {
            const val = this.value / 100;
            video.volume = val;
        });

        volumeUpBtn.addEventListener('click', () => {
            let val = Math.min(1, video.volume + 0.1);
            video.volume = val;
            volumeSlider.value = val * 100;
        });

        volumeDownBtn.addEventListener('click', () => {
            let val = Math.max(0, video.volume - 0.1);
            video.volume = val;
            volumeSlider.value = val * 100;
        });

        // ===== প্লে/পজ =====
        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        });

        video.addEventListener('play', () => {
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            isPlaying = true;
        });

        video.addEventListener('pause', () => {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        });

        // ===== স্পীড কন্ট্রোল =====
        speedBtn.addEventListener('click', () => {
            const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
            let index = speeds.indexOf(currentSpeed);
            index = (index + 1) % speeds.length;
            currentSpeed = speeds[index];
            video.playbackRate = currentSpeed;
            speedText.textContent = currentSpeed + 'x';
        });

        // ===== কোয়ালিটি চেঞ্জ =====
        qualitySelect.addEventListener('change', function() {
            const quality = this.value;
            if (currentStreamUrl && currentStreamUrl.includes('.m3u8')) {
                // HLS কোয়ালিটি চেঞ্জ - বিভিন্ন স্ট্রিমের জন্য আলাদা
                console.log('কোয়ালিটি পরিবর্তন:', quality);
                // এখানে HLS প্লেয়ারের কোয়ালিটি চেঞ্জের কোড
            }
        });

        // ===== ফুলস্ক্রিন =====
        fullscreenBtn.addEventListener('click', () => {
            const elem = playerWrapper;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        });

        // ===== লাইক ও শেয়ার ইভেন্ট =====
        likeBtn.addEventListener('click', toggleLike);
        shareBtn.addEventListener('click', shareVideo);

        // ===== ফায়ারস্টোর থেকে স্ট্রিম লোড =====
        function loadStreams() {
            const q = query(collection(db, 'streams'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                streamGrid.innerHTML = '';
                if (snapshot.empty) {
                    streamGrid.innerHTML =
                        `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#555;font-size:16px;"><i class="fas fa-video-slash" style="font-size:40px;display:block;margin-bottom:15px;color:#333;"></i>কোনো লাইভ স্ট্রিম নেই</div>`;
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'stream-card';
                    card.innerHTML = `
                            <img src="${data.thumbnail || 'https://via.placeholder.com/400x225/1a1a1a/444?text=LEgUle+Sa'}" 
                                 alt="${data.name}" 
                                 onerror="this.src='https://via.placeholder.com/400x225/1a1a1a/444?text=LEgUle+Sa'">
                            <div class="stream-info-card">
                                <h4>${data.name || 'নামহীন স্ট্রিম'}</h4>
                                <p>${data.channel || 'চ্যানেল'}</p>
                                <span class="live-tag">লাইভ</span>
                            </div>
                        `;
                    card.addEventListener('click', () => {
                        if (data.url) {
                            const videoId = doc.id;
                            loadVideo(data.url, data.name || 'লাইভ স্ট্রিম', data.channel || 'চ্যানেল',
                                videoId);
                        }
                    });
                    streamGrid.appendChild(card);
                });

                // ইউআরএল প্যারামিটার চেক
                const params = new URLSearchParams(window.location.search);
                const videoParam = params.get('v');
                if (videoParam) {
                    snapshot.forEach((doc) => {
                        if (doc.id === videoParam) {
                            const data = doc.data();
                            if (data.url) {
                                loadVideo(data.url, data.name || 'লাইভ স্ট্রিম', data.channel || 'চ্যানেল',
                                    doc.id);
                            }
                        }
                    });
                }
            }, (err) => console.error('স্ট্রিম লোডে সমস্যা:', err));
        }

        // ===== ফায়ারস্টোর থেকে বিজ্ঞাপন লোড =====
        function loadAds() {
            const q = query(collection(db, 'ads'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                adContainer.innerHTML = '';
                if (snapshot.empty) {
                    adContainer.innerHTML =
                        `<div style="grid-column:1/-1;text-align:center;padding:30px;color:#333;font-size:14px;"><i class="fas fa-ad" style="font-size:30px;display:block;margin-bottom:10px;"></i>কোনো বিজ্ঞাপন নেই</div>`;
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'ad-item';
                    div.innerHTML = `
                            <img src="${data.imageUrl || 'https://via.placeholder.com/400x200/1a1a1a/444?text=বিজ্ঞাপন'}" 
                                 alt="${data.name || 'বিজ্ঞাপন'}"
                                 onerror="this.src='https://via.placeholder.com/400x200/1a1a1a/444?text=বিজ্ঞাপন'">
                            <div class="ad-content">
                                <h4>${data.name || 'বিজ্ঞাপন'}</h4>
                                ${data.link ? `<a href="${data.link}" target="_blank">বিস্তারিত দেখুন <i class="fas fa-arrow-right"></i></a>` : ''}
                            </div>
                        `;
                    adContainer.appendChild(div);
                });
            }, (err) => console.error('বিজ্ঞাপন লোডে সমস্যা:', err));
        }

        // ===== শুরু করুন =====
        loadStreams();
        loadAds();

        console.log('🔴 LEgUle Sa লাইভ স্ট্রিমিং প্ল্যাটফর্ম সক্রিয়!');
        console.log('✅ লাইভ ইন্ডিকেটর ৩ সেকেন্ড পর会自动 লুকাবে');
        console.log('✅ URL শেয়ার করলে সরাসরি ভিডিও চালু হবে');
        console.log('✅ ভলিউম, স্পীড, রেজোলিউশন কন্ট্রোল কাজ করছে');
    </script>

</body>
</html>
