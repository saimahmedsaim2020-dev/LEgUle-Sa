<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>LEgUle Sa – অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #e74c3c;
            border-radius: 10px;
        }

        /* ===== লগইন পেজ ===== */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e, #16213e);
            padding: 20px;
        }
        .login-box {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 20px;
            padding: 45px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(231, 76, 60, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .login-box .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-box .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-box .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .login-box .form-group {
            margin-bottom: 20px;
        }
        .login-box .form-group label {
            display: block;
            color: #aaa;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #222;
            background: #0a0a0a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        .login-box .form-group input:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(231, 76, 60, 0.4);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-error {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .login-error.show {
            display: block;
        }
        .google-btn {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 12px;
            background: #0a0a0a;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }
        .google-btn:hover {
            border-color: #e74c3c;
            background: #111;
            transform: translateY(-2px);
        }
        .google-btn img {
            width: 22px;
            height: 22px;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #555;
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #222;
        }
        .divider::before {
            margin-right: 15px;
        }
        .divider::after {
            margin-left: 15px;
        }

        /* ===== অ্যাডমিন প্যানেল ===== */
        .admin-panel {
            display: none;
        }
        header {
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e, #16213e);
            padding: 18px 25px;
            border-bottom: 3px solid #e74c3c;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(231, 76, 60, 0.15);
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .header-actions .user-info {
            color: #aaa;
            font-size: 14px;
        }
        .header-actions .user-info i {
            color: #e74c3c;
            margin-right: 6px;
        }
        .logout-btn {
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid #e74c3c;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .logout-btn:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }
        .back-btn {
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid #e74c3c;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .back-btn:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        .admin-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .admin-card {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }
        .admin-card h2 {
            color: #e74c3c;
            font-size: 20px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #222;
            background: #0a0a0a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.1);
        }
        .form-group input[type="file"] {
            padding: 10px;
            background: #0a0a0a;
        }
        .submit-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            color: #fff;
            padding: 14px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(231, 76, 60, 0.4);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .image-preview {
            margin-top: 10px;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #222;
        }
        .image-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            display: block;
        }

        .list-container {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }
        .list-container h2 {
            color: #e74c3c;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #0a0a0a;
            border-radius: 12px;
            border-left: 4px solid #e74c3c;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .list-item:hover {
            background: #111;
        }
        .list-item .item-info {
            flex: 1;
        }
        .list-item .item-name {
            font-weight: 700;
            font-size: 15px;
        }
        .list-item .item-detail {
            color: #888;
            font-size: 13px;
        }
        .list-item .item-preview {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
            border: 1px solid #333;
        }
        .delete-btn {
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 18px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .delete-btn:hover {
            background: rgba(231, 76, 60, 0.15);
        }

        .message {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }
        .message.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .message.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        .message.loading {
            display: block;
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid #3498db;
            color: #3498db;
        }

        .admin-settings {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }
        .admin-settings h2 {
            color: #e74c3c;
            font-size: 20px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }
        .admin-settings .form-group input {
            background: #0a0a0a;
        }

        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
            .logo h1 {
                font-size: 22px;
            }
            .login-box {
                padding: 30px 20px;
            }
            .header-actions {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
            }
            .header-actions .user-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- ====== লগইন পেজ ====== -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <div class="logo">
                <h1>⚡ LEgUle Sa</h1>
                <p>অ্যাডমিন প্যানেল</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> ইমেইল</label>
                    <input type="email" id="loginEmail" placeholder="admin@legule.com" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
                    <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড দিন" required />
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> লগইন করুন
                </button>
                <div class="login-error" id="loginError">❌ ইমেইল বা পাসওয়ার্ড ভুল!</div>
            </form>

            <div class="divider">অথবা</div>

            <button class="google-btn" id="googleLoginBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                </svg>
                Google দিয়ে লগইন করুন
            </button>
        </div>
    </div>

    <!-- ====== অ্যাডমিন প্যানেল ====== -->
    <div class="admin-panel" id="adminPanel">

        <header>
            <div class="header-container">
                <div class="logo">
                    <h1>⚡ LEgUle Sa <span style="font-size:16px;color:#888;margin-left:10px;font-weight:400;">অ্যাডমিন</span></h1>
                </div>
                <div class="header-actions">
                    <span class="user-info" id="userInfo"><i class="fas fa-user-circle"></i> <span id="userEmail">admin@legule.com</span></span>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
                    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> মূল সাইট</a>
                </div>
            </div>
        </header>

        <div class="admin-container">

            <div id="message" class="message"></div>

            <!-- অ্যাডমিন সেটিংস (ইমেইল/পাসওয়ার্ড পরিবর্তন) -->
            <div class="admin-settings">
                <h2><i class="fas fa-cog"></i> অ্যাডমিন সেটিংস</h2>
                <form id="adminSettingsForm">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> অ্যাডমিন ইমেইল</label>
                        <input type="email" id="adminEmailInput" placeholder="admin@legule.com" />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> অ্যাডমিন পাসওয়ার্ড</label>
                        <input type="password" id="adminPasswordInput" placeholder="পাসওয়ার্ড দিন" />
                    </div>
                    <button type="submit" class="submit-btn" id="settingsSaveBtn">
                        <i class="fas fa-save"></i> সেটিংস সংরক্ষণ করুন
                    </button>
                </form>
            </div>

            <div class="admin-grid">

                <!-- স্ট্রিম ফর্ম -->
                <div class="admin-card">
                    <h2><i class="fas fa-plus-circle"></i> নতুন লাইভ স্ট্রিম</h2>
                    <form id="addStreamForm">
                        <div class="form-group">
                            <label>স্ট্রিমের নাম *</label>
                            <input type="text" id="streamName" placeholder="যেমন: ক্রিকেট ম্যাচ" required />
                        </div>
                        <div class="form-group">
                            <label>স্ট্রিম URL (YouTube/M3U8/MP4) *</label>
                            <input type="text" id="streamUrl" placeholder="https://example.com/stream.m3u8" required />
                        </div>
                        <div class="form-group">
                            <label>চ্যানেল / বিভাগ</label>
                            <input type="text" id="streamChannel" placeholder="যেমন: স্পোর্টস" />
                        </div>
                        <div class="form-group">
                            <label>থাম্বনেইল ছবি আপলোড করুন (Cloudinary)</label>
                            <input type="file" id="streamImage" accept="image/*" />
                            <div class="image-preview" id="streamImagePreview">
                                <img id="streamPreviewImg" src="#" alt="প্রিভিউ" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>অথবা ছবির লিংক দিন</label>
                            <input type="url" id="streamThumbnail" placeholder="https://example.com/thumb.jpg" />
                        </div>
                        <button type="submit" class="submit-btn" id="streamSubmitBtn">
                            <i class="fas fa-save"></i> স্ট্রিম সংরক্ষণ করুন
                        </button>
                    </form>
                </div>

                <!-- বিজ্ঞাপন ফর্ম -->
                <div class="admin-card">
                    <h2><i class="fas fa-ad"></i> বিজ্ঞাপন আপলোড</h2>
                    <form id="addAdForm">
                        <div class="form-group">
                            <label>বিজ্ঞাপনের নাম *</label>
                            <input type="text" id="adName" placeholder="বিজ্ঞাপনের নাম" required />
                        </div>
                        <div class="form-group">
                            <label>বিজ্ঞাপনের ছবি আপলোড করুন (Cloudinary)</label>
                            <input type="file" id="adImage" accept="image/*" />
                            <div class="image-preview" id="adImagePreview">
                                <img id="adPreviewImg" src="#" alt="প্রিভিউ" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>অথবা ছবির লিংক দিন</label>
                            <input type="url" id="adImageUrl" placeholder="https://example.com/ad-image.jpg" />
                        </div>
                        <div class="form-group">
                            <label>বিজ্ঞাপনের লিংক (ঐচ্ছিক)</label>
                            <input type="url" id="adLink" placeholder="https://example.com" />
                        </div>
                        <button type="submit" class="submit-btn" id="adSubmitBtn">
                            <i class="fas fa-upload"></i> বিজ্ঞাপন সংরক্ষণ করুন
                        </button>
                    </form>
                </div>
            </div>

            <!-- স্ট্রিম লিস্ট -->
            <div class="list-container">
                <h2><i class="fas fa-list"></i> বিদ্যমান লাইভ স্ট্রিম</h2>
                <div id="streamList"></div>
            </div>

            <!-- অ্যাড লিস্ট -->
            <div class="list-container">
                <h2><i class="fas fa-images"></i> বিদ্যমান বিজ্ঞাপন</h2>
                <div id="adList"></div>
            </div>

        </div>
    </div>

    <!-- ============================================================ -->
    <!-- =============== ফায়ারবেস + জাভাস্ক্রিপ্ট ================== -->
    <!-- ============================================================ -->

    <script type="importmap">

/**
 * Cloudinary এ ছবি আপলোড করুন
 * @param {File} file - আপলোড করার ফাইল
 * @returns {Promise<string>} - আপলোড হওয়া ছবির URL
 */
async function uploadToCloudinary(file) {
    // ফাইল ভ্যালিডেশন
    if (!file) {
        throw new Error('কোন ফাইল নির্বাচন করা হয়নি!');
    }

    // ফাইল সাইজ চেক (5MB এর বেশি নয়)
    if (file.size > 5 * 1024 * 1024) {
        throw new Error('ছবির সাইজ 5MB এর বেশি!');
    }

    // ফাইল টাইপ চেক (শুধু ইমেজ)
    if (!file.type.startsWith('image/')) {
        throw new Error('শুধু ছবি ফাইল আপলোড করুন!');
    }

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_CONFIG.uploadPreset);
    formData.append('cloud_name', CLOUDINARY_CONFIG.cloudName);
    formData.append('api_key', CLOUDINARY_CONFIG.apiKey);
    formData.append('folder', CLOUDINARY_CONFIG.folder);

    try {
        const response = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`,
            {
                method: 'POST',
                body: formData
            }
        );

        const data = await response.json();

        // সফল আপলোড
        if (data.secure_url) {
            return data.secure_url;
        }

        // এরর হ্যান্ডলিং
        console.error('Cloudinary Error Response:', data);
        throw new Error(data.error?.message || 'Cloudinary আপলোড ব্যর্থ হয়েছে!');

    } catch (error) {
        console.error('Cloudinary Upload Error:', error);
        throw error;
    }
}

/**
 * একাধিক ছবি আপলোড করুন
 * @param {File[]} files - আপলোড করার ফাইলগুলোর অ্যারে
 * @returns {Promise<string[]>} - আপলোড হওয়া ছবির URL গুলো
 */
async function uploadMultipleToCloudinary(files) {
    if (!files || files.length === 0) {
        throw new Error('কোন ফাইল নির্বাচন করা হয়নি!');
    }

    const uploadPromises = files.map(file => uploadToCloudinary(file));
    return await Promise.all(uploadPromises);
}

/**
 * Cloudinary থেকে ছবি ডিলিট করুন (ঐচ্ছিক)
 * @param {string} publicId - ছবির public ID
 */
async function deleteFromCloudinary(publicId) {
    try {
        const formData = new FormData();
        formData.append('public_id', publicId);
        formData.append('api_key', CLOUDINARY_CONFIG.apiKey);
        formData.append('api_secret', CLOUDINARY_CONFIG.apiSecret);
        formData.append('cloud_name', CLOUDINARY_CONFIG.cloudName);

        const response = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/destroy`,
            {
                method: 'POST',
                body: formData
            }
        );

        const data = await response.json();
        return data.result === 'ok';
    } catch (error) {
        console.error('Cloudinary Delete Error:', error);
        return false;
    }
}

/**
 * ছবির প্রিভিউ দেখানোর ফাংশন
 * @param {File} file - প্রিভিউ দেখানোর ফাইল
 * @param {string} previewElementId - প্রিভিউ দেখানোর এলিমেন্টের ID
 */
function previewImage(file, previewElementId) {
    const previewElement = document.getElementById(previewElementId);
    if (!previewElement) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        previewElement.src = event.target.result;
        previewElement.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

                return;
            }

            adSubmitBtn.disabled = true;
            adSubmitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> সংরক্ষণ...';
            showMessage('বিজ্ঞাপন সংরক্ষণ করা হচ্ছে...', 'loading');

            try {
                let finalImageUrl = imageUrl;
                if (imageFile) {
                    finalImageUrl = await uploadToCloudinary(imageFile);
                } else if (imageUrl) {
                    try { new URL(imageUrl); } catch { throw new Error('ছবির লিংক সঠিক নয়!'); }
                }

                await addDoc(collection(db, 'ads'), {
                    name,
                    link: link || '',
                    imageUrl: finalImageUrl,
                    timestamp: new Date().toISOString()
                });

                showMessage('✅ বিজ্ঞাপন সংরক্ষিত!', 'success');
                document.getElementById('addAdForm').reset();
                document.getElementById('adImagePreview').style.display = 'none';

            } catch (error) {
                console.error(error);
                showMessage(`❌ ${error.message}`, 'error');
            } finally {
                adSubmitBtn.disabled = false;
                adSubmitBtn.innerHTML = '<i class="fas fa-upload"></i> বিজ্ঞাপন সংরক্ষণ করুন';
            }
        });

        // ===== স্ট্রিম লিস্ট =====
        function loadStreamList() {
            const q = query(collection(db, 'streams'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                streamList.innerHTML = '';
                if (snapshot.empty) {
                    streamList.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">কোন স্ট্রিম নেই</p>';
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    let previewHtml = data.thumbnail ?
                        `<img src="${data.thumbnail}" class="item-preview" onerror="this.style.display='none'" />` :
                        '';
                    div.innerHTML = `
                            <div style="display:flex;align-items:center;flex:1;">
                                ${previewHtml}
                                <div class="item-info">
                                    <span class="item-name">${data.name || 'নামহীন'}</span>
                                    <span class="item-detail">${data.channel || 'চ্যানেল'} • ${data.url ? '🔗 লিংক আছে' : ''}</span>
                                </div>
                            </div>
                            <button class="delete-btn" data-id="${doc.id}"><i class="fas fa-trash"></i></button>
                        `;
                    streamList.appendChild(div);
                    div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                        if (confirm('ডিলিট করতে চান?')) {
                            try {
                                await deleteDoc(doc(db, 'streams', e.target.closest('button').dataset.id));
                                showMessage('✅ ডিলিট করা হয়েছে!', 'success');
                            } catch (error) {
                                showMessage('❌ সমস্যা!', 'error');
                            }
                        }
                    });
                });
            });
        }

        // ===== অ্যাড লিস্ট =====
        function loadAdList() {
            const q = query(collection(db, 'ads'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                adList.innerHTML = '';
                if (snapshot.empty) {
                    adList.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">কোন বিজ্ঞাপন নেই</p>';
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    let previewHtml = data.imageUrl ?
                        `<img src="${data.imageUrl}" class="item-preview" onerror="this.style.display='none'" />` :
                        '';
                    div.innerHTML = `
                            <div style="display:flex;align-items:center;flex:1;">
                                ${previewHtml}
                                <div class="item-info">
                                    <span class="item-name">${data.name || 'বিজ্ঞাপন'}</span>
                                    <span class="item-detail">${data.link ? '🔗 লিংক আছে' : 'লিংক নেই'}</span>
                                </div>
                            </div>
                            <button class="delete-btn" data-id="${doc.id}"><i class="fas fa-trash"></i></button>
                        `;
                    adList.appendChild(div);
                    div.querySelector('.delete-btn').addEventListener('click', async (e) => {
                        if (confirm('ডিলিট করতে চান?')) {
                            try {
                                await deleteDoc(doc(db, 'ads', e.target.closest('button').dataset.id));
                                showMessage('✅ ডিলিট করা হয়েছে!', 'success');
                            } catch (error) {
                                showMessage('❌ সমস্যা!', 'error');
                            }
                        }
                    });
                });
            });
        }

        // ===== শুরু =====
        loadAdminConfig();
        console.log('🛠️ LEgUle Sa অ্যাডমিন প্যানেল সক্রিয়!');
    </script>

</body>
